<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Promise Example</title>
</head>

<body>

<h2>Kiểm tra mật khẩu (Async/Await Demo)</h2>

<input type="password" id="password" placeholder="Nhập mật khẩu">
<button id="check-btn">Kiểm tra</button>

<p id="result"></p>

<script>
const passwordInput = document.getElementById("password");
const btnCheck = document.getElementById("check-btn");
const noti = document.getElementById("result");

function checkPassword(password){
    return new Promise((resolve,reject)=>{
        setTimeout(()=>{
            if(password === "123456") resolve("Đăng nhập thành công");
            else reject("Sai mật khẩu");
        },200);
    });
}

// dùng async/await
btnCheck.addEventListener("click", async ()=>{
    const password = passwordInput.value;
    noti.innerText = "Đang kiểm tra mật khẩu...";

    try {
        const message = await checkPassword(password);
        noti.innerText = message;
    } catch (error) {
        noti.innerText = error;
    } finally {
        console.log("Hoàn tất kiểm tra");
    }
});
</script>

</body>
</html>
