<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Quản lý cho thuê trọ</title>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="menu">
                <button class="menu-item" data-section="dashboard">Tổng quan</button>
                <button class="menu-item" data-section="tenants">Người thuê</button>
                <button class="menu-item" data-section="rentals">Thuê trọ</button>
                <button class="menu-item" data-section="rooms">Phòng</button>
                <button class="menu-item" data-section="landlords">Chủ trọ</button>
            </div>
        </div>

        <div class="main">
            <div id="dashboard" class="content-section active">
                <div class="card">
                    <h2>Doanh thu tháng này</h2>
                </div>
            </div>

            <div id="tenants" class="content-section">
                <div class="card">
                    <h2>Danh sách người thuê</h2>
                    <table></table>
                    <button>Thêm người thuê</button>
                </div>
                <div class="card">
                    <h3>Tính tiền rời giữa tháng</h3>
                </div>
            </div>
            <div id="rentals" class="content-section">
                <div class="card">
                    <h2>Thông tin hợp đồng thuê</h2>
                    <table></table>
                </div>
            </div>
            <div id="rooms" class="content-section">
                <div class="card">
                    <h2>Quản lý phòng</h2>
                    <div class="room-form">
                        <input id="input-room-name" type="text" placeholder="Tên phòng">
                        <input id="input-room-price" type="text" placeholder="Giá phòng">
                        <select id="select-owner">
                            <option value="" disabled selected>Chọn chủ phòng</option>
                        </select>
                        <button id="add-room">Thêm phòng</button>
                    </div>
                    <table id="room-table">
                        <thead>
                            <tr>
                                <th>STT</th>
                                <th>Tên phòng</th>
                                <th>Giá phòng</th>
                                <th>Chủ trọ</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div id="landlords" class="content-section">
                <div class="card">
                    <h2>Chủ trọ</h2>
                    <input class="owner-new" id="owner-name-text" type="text" placeholder="Tên chủ trọ">
                    <button class="owner-new" id="owner-new-button">Thêm chủ trọ</button>
                    <table></table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src ="js/main.js">
    </script>
</body>
</html>
